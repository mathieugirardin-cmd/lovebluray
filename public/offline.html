<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b2a4a" />
    <title>Hors ligne - Lovebluray</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(54, 141, 255, 0.25), transparent 35%),
          linear-gradient(160deg, #08111d 0%, #0b1e34 55%, #08111d 100%);
        color: #eef6ff;
        padding: 24px;
      }
      main {
        max-width: 420px;
        background: rgba(7, 18, 32, 0.7);
        border: 1px solid rgba(170, 220, 255, 0.14);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(18px);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.8rem;
      }
      p {
        line-height: 1.6;
        color: rgba(236, 246, 255, 0.78);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(76, 155, 255, 0.18);
        border: 1px solid rgba(151, 202, 255, 0.24);
        color: #dff0ff;
        margin-bottom: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Mode hors ligne</div>
      <h1>Lovebluray</h1>
      <p>
        L'application n'a pas pu joindre Firebase pour le moment. L'interface reste
        disponible quand la page principale a deja ete chargee.
      </p>
    </main>
  </body>
</html>
